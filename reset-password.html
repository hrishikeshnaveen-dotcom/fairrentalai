<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FairRentalAI — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0e1e3a;--gold:#c9963a;--gold-light:#e8b55a;--green:#3a9a6e;--green-bg:#eaf6f1;--red:#c0392b;--red-bg:#fdf0ee;--border:rgba(14,30,58,0.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:white;margin-bottom:2rem;}
.logo span{color:var(--gold);}
.card{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;}
.title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--navy);margin-bottom:0.5rem;}
.sub{font-size:0.85rem;color:#4a5568;margin-bottom:1.75rem;line-height:1.6;}
.form-group{margin-bottom:1rem;}
.form-label{font-size:0.78rem;font-weight:500;color:var(--navy);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:0.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:0.9rem;color:var(--navy);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--gold);}
.btn{width:100%;background:var(--navy);color:white;border:none;border-radius:10px;padding:0.85rem;font-size:0.95rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:0.5rem;}
.btn:hover{background:#162d56;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.msg{border-radius:8px;padding:0.75rem 1rem;font-size:0.82rem;margin-bottom:1rem;display:none;}
.msg.show{display:block;}
.msg-error{background:var(--red-bg);color:var(--red);}
.msg-success{background:var(--green-bg);color:var(--green);}
.back{text-align:center;margin-top:1rem;}
.back a{color:var(--gold);font-size:0.82rem;text-decoration:none;}
</style>
</head>
<body>
<div class="logo">Fair<span>RentalAI</span></div>
<div class="card">
  <div class="title" id="card-title">Set new password</div>
  <div class="sub" id="card-sub">Choose a strong password for your FairRentalAI account.</div>
  <div class="msg msg-error" id="err-msg"></div>
  <div class="msg msg-success" id="suc-msg"></div>
  <div id="form-area">
    <div class="form-group">
      <label class="form-label">New password</label>
      <input class="form-input" type="password" id="password" placeholder="Minimum 8 characters"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm new password</label>
      <input class="form-input" type="password" id="confirm" placeholder="Repeat your password"/>
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Reset password</button>
  </div>
  <div class="back"><a href="/login.html">← Back to login</a></div>
</div>

<script>
const API = 'https://tenantiq-api-production.up.railway.app';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

if (!token || !email) {
  document.getElementById('card-title').textContent = 'Invalid link';
  document.getElementById('card-sub').textContent = 'This password reset link is invalid or has expired.';
  document.getElementById('form-area').style.display = 'none';
}

async function doReset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const err = document.getElementById('err-msg');
  const suc = document.getElementById('suc-msg');
  const btn = document.getElementById('reset-btn');
  err.classList.remove('show'); suc.classList.remove('show');

  if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.add('show'); return; }
  if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const res = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, token, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('form-area').style.display = 'none';
    suc.textContent = 'Password reset successfully! Redirecting to login...';
    suc.classList.add('show');
    setTimeout(() => window.location.href = '/login.html', 2000);
  } catch(e) {
    err.textContent = e.message; err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Reset password';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
