<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FairRentalAI — Verify Email</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:#0e1e3a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.logo{font-family:"Playfair Display",serif;font-size:1.5rem;font-weight:700;color:white;margin-bottom:2rem;}
.logo span{color:#c9963a;}
.card{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;text-align:center;}
.icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:2rem;}
.icon-loading{background:#f0ede8;}
.icon-success{background:#eaf6f1;}
.icon-error{background:#fdf0ee;}
.title{font-family:"Playfair Display",serif;font-size:1.5rem;color:#0e1e3a;margin-bottom:0.75rem;}
.sub{font-size:0.875rem;color:#4a5568;line-height:1.7;margin-bottom:2rem;}
.btn{display:inline-block;background:#0e1e3a;color:white;padding:0.75rem 2rem;border-radius:10px;text-decoration:none;font-weight:500;font-size:0.875rem;}
.btn-gold{background:#c9963a;color:#0e1e3a;}
.spinner{width:28px;height:28px;border:3px solid #e0ddd8;border-top-color:#c9963a;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="logo">Fair<span>RentalAI</span></div>
<div class="card" id="card">
  <div class="icon icon-loading"><div class="spinner"></div></div>
  <div class="title">Verifying your email...</div>
  <div class="sub">Please wait a moment.</div>
</div>
<script>
const API = 'https://tenantiq-api-production.up.railway.app';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

async function verify() {
  if (!token || !email) {
    document.getElementById('card').innerHTML = '<div class="icon icon-error">&#x2717;</div><div class="title">Invalid link</div><div class="sub">This verification link is invalid.</div><a href="/login.html" class="btn">Back to login</a>';
    return;
  }
  try {
    const res = await fetch(API + '/api/auth/verify-email?token=' + encodeURIComponent(token) + '&email=' + encodeURIComponent(email));
    const data = await res.json();
    if (res.ok && data.success) {
      // Update localStorage so dashboard knows email is verified
try {
  const landlord = JSON.parse(localStorage.getItem('fra_landlord') || '{}');
  if (landlord) { landlord.emailVerified = true; localStorage.setItem('fra_landlord', JSON.stringify(landlord)); }
} catch(e) {}
document.getElementById('card').innerHTML = '<div class="icon icon-success">&#x2713;</div><div class="title">Email verified!</div><div class="sub">Your account is now active. You can now add properties to your dashboard.</div><a href="/dashboard.html" class="btn btn-gold">Go to dashboard</a>';
    } else {
      throw new Error(data.error || 'Verification failed');
    }
  } catch(e) {
    document.getElementById('card').innerHTML = '<div class="icon icon-error">&#x2717;</div><div class="title">Verification failed</div><div class="sub">' + (e.message || 'This link may have expired.') + '<br/><br/>Please register again or contact info@fairrentalai.com</div><a href="/login.html" class="btn">Back to login</a>';
  }
}

verify();
</script>
</body>
</html>
